id: https://github.com/JonasHeinickeBio/pyEuropePMC/schemas/linkml/article_content
name: pyeuropepmc-article-content
title: pyEuropePMC Article Content Schema
description: |
  LinkML schema for structured article content extracted from Europe PMC JATS XML.

  Defines the ContentBlock model (typed content blocks preserving document structure)
  and StructuredSection for RAG/LLM-ready article representation.

  This schema integrates with the biomedical-knowledge-lookup annotation pipeline:
  - ContentBlock.text provides the text for sentence-level annotation
  - StructuredSection preserves the document context for annotations
  - ArticleContent ties everything together with metadata

  Based on JATS4R recommendations and pmcgrab content block approach.

prefixes:
  linkml: https://w3id.org/linkml/
  pcm: https://github.com/JonasHeinickeBio/pyEuropePMC/schemas/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: pcm
default_range: string

types:
  string:
    uri: xsd:string
    base: str
  integer:
    uri: xsd:integer
    base: int
  float:
    uri: xsd:float
    base: float
  boolean:
    uri: xsd:boolean
    base: bool
  datetime:
    uri: xsd:dateTime
    base: datetime
  uri:
    uri: xsd:anyURI
    base: str
  json_string:
    uri: xsd:string
    base: str
    description: JSON-serialized string for complex nested data

# =============================================================================
# Enums
# =============================================================================

enums:
  ContentBlockType:
    description: >
      Semantic type of a content block. Preserves the original JATS element type
      so downstream consumers can handle each block appropriately.
    permissible_values:
      paragraph:
        description: A plain text paragraph (<p>)
      heading:
        description: A section/subsection heading
      list:
        description: An ordered or unordered list (<list>)
      formula:
        description: A mathematical formula/equation (<disp-formula>, <inline-formula>)
      figure_ref:
        description: A reference/citation to a figure
      table_ref:
        description: A reference/citation to a table
      code:
        description: A code/preformatted block (<code>, <preformat>)
      boxed_text:
        description: A boxed/highlighted text block (<boxed-text>)
      figure:
        description: A figure with caption and graphic URI (<fig>)
      table:
        description: A table with caption (<table-wrap>)
      mathml:
        description: A MathML expression
      peer_review:
        description: Peer review content from sub-articles
      unknown_block:
        description: An unrecognized JATS element preserved as-is

  SectionType:
    description: Structural type of a document section.
    permissible_values:
      body:
        description: Main article body section
      back:
        description: Back matter (acknowledgments, glossary)
      appendix:
        description: Appendix/Supplementary material section
      peer_review:
        description: Peer review sub-article section

  ListStyle:
    description: Style of a list block.
    permissible_values:
      ordered:
        description: Numbered list
      unordered:
        description: Bullet list
      simple:
        description: Simple list without markers

# =============================================================================
# Classes
# =============================================================================

classes:
  ContentBlock:
    description: >
      A single typed content block within a document section.
      Each block carries a type identifier and type-specific fields.
      Unknown JATS blocks are preserved as unknown_block instead of dropped.
    attributes:
      type:
        description: Semantic type of this content block
        range: ContentBlockType
        required: true

      text:
        description: Plain text content (for paragraphs, headings, etc.)
        range: string

      items:
        description: List items (for ordered/unordered lists)
        range: string
        multivalued: true

      list_type:
        description: List style — ordered, unordered, or simple
        range: ListStyle

      label:
        description: Display label (e.g. "Fig. 1", "Eq. 1")
        range: string

      target_id:
        description: Reference target identifier (e.g. "fig1", "tab1")
        range: string

      language:
        description: Programming language for code blocks
        range: string

      tex:
        description: LaTeX representation (for formula blocks)
        range: string

      mathml:
        description: Raw MathML XML string
        range: string

      caption:
        description: Caption text (for figures, tables)
        range: string

      uri:
        description: External URI (for graphics/images)
        range: uri

      jats_tag:
        description: Original JATS tag name (for unknown blocks)
        range: string

      metadata:
        description: Additional type-specific metadata (JSON-serialized)
        range: json_string

  StructuredSection:
    description: >
      A document section containing ordered typed content blocks.
      Preserves the document structure for RAG/LLM pipelines.
    attributes:
      title:
        description: Section title (may be empty for untitled sections)
        range: string
        required: true

      content:
        description: Ordered sequence of content blocks in this section
        range: ContentBlock
        multivalued: true
        required: true

      section_type:
        description: Section type hint (body, back, appendix, peer_review)
        range: SectionType

  ArticleMetadata:
    description: Key metadata extracted from the article XML.
    attributes:
      pmid:
        description: PubMed ID
        range: string
      pmcid:
        description: PubMed Central ID
        range: string
      doi:
        description: Digital Object Identifier
        range: string
      title:
        description: Article title
        range: string
      journal:
        description: Journal name
        range: string
      publication_year:
        description: Publication year
        range: integer
      authors:
        description: Author names as strings
        range: string
        multivalued: true
      keywords:
        description: Article keywords
        range: string
        multivalued: true

  ArticleContent:
    description: >
      Complete structured representation of a Europe PMC article with
      typed content blocks. This is the top-level container that ties
      metadata, structured sections, and assets together.

      Designed to integrate with the biomedical-knowledge-lookup annotation
      pipeline where ContentBlock.text values are fed into
      MultiSourceAnnotationResult for concept detection.
    attributes:
      article_id:
        description: Primary article identifier (PMCID, DOI, or PMID)
        range: string
        required: true
        identifier: true

      metadata:
        description: Article metadata
        range: ArticleMetadata

      sections:
        description: Structured body sections with typed content blocks
        range: StructuredSection
        multivalued: true

      assets:
        description: External asset references (figures, supplementary)
        range: AssetRef
        multivalued: true

      peer_reviews:
        description: Peer review materials (if available)
        range: PeerReview
        multivalued: true

  AssetRef:
    description: Reference to an external asset (figure, supplementary material).
    attributes:
      asset_type:
        description: Type of asset
        range: string
        required: true
      uri:
        description: URI or URL of the asset
        range: uri
      label:
        description: Display label (e.g. "Fig. 1")
        range: string
      caption:
        description: Caption text
        range: string
      mime_type:
        description: MIME type of the asset
        range: string

  PeerReview:
    description: A single peer review item extracted from sub-articles.
    attributes:
      review_type:
        description: Type of review (decision-letter, referee-report, etc.)
        range: string
        required: true
      title:
        description: Title of the review
        range: string
      contributors:
        description: Persons involved (JSON-serialized list of {name, type})
        range: json_string
      revision_round:
        description: Which revision round this belongs to
        range: integer
      sections:
        description: Structured content of the review
        range: StructuredSection
        multivalued: true
