# PyEuropePMC LinkML Schema - Reference Entity
# This file contains the ReferenceEntity class definition

id: https://w3id.org/pyeuropepmc/entities/reference
name: pyeuropepmc-reference-entity
description: Reference entity class for PyEuropePMC

imports:
  - base
  - slots

classes:
  ReferenceEntity:
    description: >-
      Entity representing a bibliographic reference with BIBO alignment.
      Contains citation information for works referenced by papers.
    class_uri: bibo:Article
    is_a: ScholarlyWorkEntity
    slots:
      - author_list
      - raw_citation
      - citing_paper
      - authors
    slot_usage:
      authors:
        required: false
        description: Author list (comma-separated string or list of author names)
        range: string
        multivalued: true
