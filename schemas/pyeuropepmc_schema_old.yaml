# PyEuropePMC LinkML Schema
# This is the single source of truth for all PyEuropePMC data models.
#
# This schema defines:
# - Entity classes for scholarly works, authors, institutions, journals, etc.
# - Relationships between entities with inverse predicates
# - Cardinality constraints and validation patterns
# - Namespace prefixes for RDF serialization
# - Controlled vocabularies using enums
#
# From this schema, you can generate:
# - JSON Schema for validation
# - SHACL shapes for RDF validation
# - Python dataclasses
# - OWL ontology
# - Documentation
#
# Usage:
#   gen-json-schema schemas/pyeuropepmc_schema.yaml > schemas/pyeuropepmc.schema.json
#   gen-shacl schemas/pyeuropepmc_schema.yaml > shacl/pyeuropepmc.shacl.ttl
#   gen-pydantic schemas/pyeuropepmc_schema.yaml > src/pyeuropepmc/models/generated.py

id: https://w3id.org/pyeuropepmc
name: pyeuropepmc
title: PyEuropePMC Data Model Schema
description: >-
  LinkML schema defining the data model for PyEuropePMC, a Python toolkit for
  searching, retrieving, and analyzing scientific literature from Europe PMC.
  This schema provides a single source of truth for generating JSON Schema,
  RDF/OWL, SHACL shapes, and Python dataclasses.
version: 1.0.0
license: MIT

# Schema metadata
default_range: string
default_prefix: pyeuropepmc

# Namespace prefixes for RDF serialization
prefixes:
  pyeuropepmc: https://w3id.org/pyeuropepmc/vocab#
  pyeuropepmcdata: https://w3id.org/pyeuropepmc/data#
  linkml: https://w3id.org/linkml/
  dcterms: http://purl.org/dc/terms/
  foaf: http://xmlns.com/foaf/0.1/
  bibo: http://purl.org/ontology/bibo/
  prov: http://www.w3.org/ns/prov#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  nif: http://persistence.uni-leipzig.org/nlp2rdf/ontologies/nif-core#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  owl: http://www.w3.org/2002/07/owl#
  mesh: http://id.nlm.nih.gov/mesh/
  meshv: http://id.nlm.nih.gov/mesh/vocab#
  obo: http://purl.obolibrary.org/obo/
  org: http://www.w3.org/ns/org#
  cito: http://purl.org/spar/cito/
  datacite: http://purl.org/spar/datacite/
  frapo: http://purl.org/cerif/frapo/
  geo: http://www.w3.org/2003/01/geo/wgs84_pos#
  ror: https://ror.org/vocab#
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

# Import standard LinkML types
imports:
  - linkml:types

# Controlled vocabularies (enums)
enums:
  OpenAccessStatus:
    description: Open access status of a publication
    permissible_values:
      open:
        description: Fully open access
      closed:
        description: Not open access
      hybrid:
        description: Hybrid open access
      green:
        description: Green open access (preprint/postprint)
      gold:
        description: Gold open access
      bronze:
        description: Bronze open access
      unknown:
        description: Unknown open access status

  PublicationType:
    description: Type of scholarly publication
    permissible_values:
      journal_article:
        description: Journal article
      review:
        description: Review article
      preprint:
        description: Preprint
      book_chapter:
        description: Book chapter
      conference_paper:
        description: Conference paper
      dataset:
        description: Dataset
      thesis:
        description: Thesis or dissertation
      other:
        description: Other publication type

  InstitutionType:
    description: Type of research institution
    permissible_values:
      education:
        description: Educational institution
      healthcare:
        description: Healthcare institution
      company:
        description: Company or corporation
      government:
        description: Government organization
      nonprofit:
        description: Nonprofit organization
      facility:
        description: Research facility
      other:
        description: Other institution type

  AuthorPosition:
    description: Position of author in author list
    permissible_values:
      first:
        description: First author
      middle:
        description: Middle author
      last:
        description: Last/corresponding author
      corresponding:
        description: Corresponding author (may overlap with first/last)

  AuthorRole:
    description: Specific roles or contributions of authors
    permissible_values:
      conceptualization:
        description: Ideas, formulation of research goals
      methodology:
        description: Development of methodology
      software:
        description: Programming, software development
      validation:
        description: Verification of methods/analyses
      formal_analysis:
        description: Application of statistical techniques
      investigation:
        description: Conducting research, data collection
      resources:
        description: Provision of study materials/reagents
      data_curation:
        description: Management of data activities
      writing_original_draft:
        description: Preparation of original draft
      writing_review_editing:
        description: Review and editing of manuscript
      visualization:
        description: Preparation of figures/tables
      supervision:
        description: Oversight and leadership
      project_administration:
        description: Management and coordination
      funding_acquisition:
        description: Acquisition of funding

  SectionType:
    description: Type of document section
    permissible_values:
      abstract:
        description: Abstract section
      introduction:
        description: Introduction section
      methods:
        description: Methods/Materials section
      results:
        description: Results section
      discussion:
        description: Discussion section
      conclusion:
        description: Conclusion section
      acknowledgments:
        description: Acknowledgments section
      references:
        description: References/Bibliography section
      supplementary:
        description: Supplementary materials
      appendix:
        description: Appendix section
      other:
        description: Other section type

  CitationType:
    description: Type of citation relationship
    permissible_values:
      cites:
        description: General citation
      cites_as_evidence:
        description: Cites as evidence/support
      cites_as_background:
        description: Cites for background information
      cites_as_related:
        description: Cites related work
      cites_as_method:
        description: Cites methodological work
      cites_for_information:
        description: Cites for specific information
      shares_authors:
        description: Shares authors with cited work
      agrees_with:
        description: Agrees with cited work
      disagrees_with:
        description: Disagrees with cited work
      cites_as_metadata:
        description: Citation in metadata/references section
      cites_as_data:
        description: Cites data source

# Slot definitions (reusable attribute definitions)
slots:
  # Core identifier slots
  id:
    description: Local identifier (slug/uuid) for the entity
    slot_uri: dcterms:identifier
    required: false
    range: string

  label:
    description: Human-readable label for the entity
    slot_uri: rdfs:label
    range: string

  source_uri:
    description: Source URI for provenance tracking
    slot_uri: prov:hadPrimarySource
    range: uriorcurie

  confidence:
    description: Confidence score for extracted information (0.0 to 1.0)
    slot_uri: pyeuropepmc:confidence
    range: float
    minimum_value: 0.0
    maximum_value: 1.0

  quality_score:
    description: Overall quality score for data completeness and accuracy (0.0 to 1.0)
    slot_uri: pyeuropepmc:qualityScore
    range: float
    minimum_value: 0.0
    maximum_value: 1.0

  confidence_score:
    description: Confidence score for citation type classification (0.0 to 1.0)
    slot_uri: pyeuropepmc:confidenceScore
    range: float
    minimum_value: 0.0
    maximum_value: 1.0

  types:
    description: RDF types (CURIEs/URIs) for this entity
    slot_uri: rdf:type
    multivalued: true
    range: uriorcurie

  data_sources:
    description: List of data sources that contributed to this entity
    slot_uri: prov:hadPrimarySource
    multivalued: true
    range: string

  last_updated:
    description: Timestamp of last data update (ISO 8601)
    slot_uri: dcterms:modified
    range: datetime

  # Scholarly work slots
  title:
    description: Work or entity title
    slot_uri: dcterms:title
    range: string

  doi:
    description: Digital Object Identifier
    slot_uri: bibo:doi
    range: uriorcurie
    pattern: "^10\\.\\d{4,9}/[-._;()/:A-Z0-9]+$"

  pmcid:
    description: PubMed Central ID
    slot_uri: pyeuropepmc:pmcid
    range: string
    pattern: "^PMC\\d+$"

  pmid:
    description: PubMed ID
    slot_uri: pyeuropepmc:pmid
    range: string
    pattern: "^\\d+$"

  volume:
    description: Publication volume
    slot_uri: bibo:volume
    range: string

  pages:
    description: Page range (e.g., "123-456")
    slot_uri: bibo:pages
    range: string

  publication_year:
    description: Publication year (4-digit)
    slot_uri: dcterms:issued
    range: integer
    minimum_value: 1000
    maximum_value: 9999

  publication_date:
    description: Full publication date
    slot_uri: dcterms:date
    range: date

  semantic_scholar_id:
    description: Semantic Scholar paper ID
    slot_uri: pyeuropepmc:semanticScholarId
    range: string

  # Paper-specific slots
  issue:
    description: Journal issue number
    slot_uri: bibo:issue
    range: string

  pub_date:
    description: Publication date (legacy field)
    slot_uri: dcterms:issued
    range: date

  abstract:
    description: Article abstract
    slot_uri: dcterms:abstract
    range: string

  citation_count:
    description: Total citation count
    slot_uri: pyeuropepmc:citationCount
    range: integer
    minimum_value: 0

  influential_citation_count:
    description: Influential citation count
    slot_uri: pyeuropepmc:influentialCitationCount
    range: integer
    minimum_value: 0

  is_oa:
    description: Open access status flag
    slot_uri: dcterms:accessRights
    range: boolean

  oa_status:
    description: Open access status details
    slot_uri: dcterms:accessRights
    range: OpenAccessStatus

  oa_url:
    description: Open access URL
    slot_uri: bibo:uri
    range: uriorcurie

  reference_count:
    description: Number of references cited
    slot_uri: bibo:numPages
    range: integer
    minimum_value: 0

  cited_by_count:
    description: Number of papers citing this work
    slot_uri: pyeuropepmc:citationCount
    range: integer
    minimum_value: 0

  publisher:
    description: Publisher name
    slot_uri: dcterms:publisher
    range: string

  issn:
    description: ISSN identifier
    slot_uri: bibo:issn
    range: string
    pattern: "^\\d{4}-\\d{3}[\\dX]$"

  publication_type:
    description: Type of publication
    slot_uri: bibo:DocumentType
    range: PublicationType

  first_page:
    description: First page number
    slot_uri: bibo:pageStart
    range: string

  last_page:
    description: Last page number
    slot_uri: bibo:pageEnd
    range: string

  semantic_scholar_corpus_id:
    description: Semantic Scholar corpus ID
    slot_uri: pyeuropepmc:semanticScholarCorpusId
    range: string

  openalex_id:
    description: OpenAlex identifier
    slot_uri: pyeuropepmc:openAlexId
    range: string

  license_url:
    description: License URL
    slot_uri: dcterms:license
    range: uriorcurie

  license_text:
    description: License description text
    slot_uri: dcterms:rights
    range: string

  keywords:
    description: List of keywords
    slot_uri: dcterms:subject
    multivalued: true
    range: string

  fields_of_study:
    description: Fields of study
    slot_uri: dcterms:subject
    multivalued: true
    range: string

  related_works:
    description: Related work IDs
    slot_uri: dcterms:related
    multivalued: true
    range: string

  pub_types:
    description: List of publication types from Europe PMC
    slot_uri: bibo:DocumentType
    multivalued: true
    range: string

  mesh_terms:
    description: MeSH terms associated with the paper
    slot_uri: meshv:hasDescriptor
    multivalued: true
    range: string

  topics:
    description: Research topics from OpenAlex
    slot_uri: dcterms:subject
    multivalued: true
    range: string

  has_pdf:
    description: Whether the paper has a PDF available
    slot_uri: pyeuropepmc:hasPdf
    range: boolean

  has_supplementary:
    description: Whether the paper has supplementary materials
    slot_uri: pyeuropepmc:hasSupplementary
    range: boolean

  in_epmc:
    description: Whether the paper is in Europe PMC
    slot_uri: pyeuropepmc:inEpmc
    range: boolean

  in_pmc:
    description: Whether the paper is in PubMed Central
    slot_uri: pyeuropepmc:inPmc
    range: boolean

  journal_issn:
    description: Journal ISSN identifier
    slot_uri: bibo:issn
    range: string
    pattern: "^\\d{4}-\\d{3}[\\dX]$"

  page_info:
    description: Page information string
    slot_uri: bibo:pages
    range: string

  has_references:
    description: Whether the paper has references
    slot_uri: pyeuropepmc:hasReferences
    range: boolean

  has_text_mined_terms:
    description: Whether the paper has text-mined terms
    slot_uri: pyeuropepmc:hasTextMinedTerms
    range: boolean

  has_db_cross_references:
    description: Whether the paper has database cross-references
    slot_uri: pyeuropepmc:hasDbCrossReferences
    range: boolean

  has_labs_links:
    description: Whether the paper has labs links
    slot_uri: pyeuropepmc:hasLabsLinks
    range: boolean

  has_tm_accession_numbers:
    description: Whether the paper has text-mined accession numbers
    slot_uri: pyeuropepmc:hasTmAccessionNumbers
    range: boolean

  first_index_date:
    description: First index date
    slot_uri: pyeuropepmc:firstIndexDate
    range: date

  first_publication_date:
    description: First publication date
    slot_uri: pyeuropepmc:firstPublicationDate
    range: date

  external_ids:
    description: External identifiers from various sources
    slot_uri: pyeuropepmc:externalIds
    range: string

  external_id_conflicts:
    description: Conflicts in external identifiers
    slot_uri: pyeuropepmc:externalIdConflicts
    range: string

  license:
    description: License information
    slot_uri: dcterms:license
    range: string

  # Figure slots
  caption:
    description: Caption or description
    slot_uri: dcterms:description
    range: string

  figure_label:
    description: Figure label (e.g., "Figure 1")
    slot_uri: rdfs:label
    range: string

  graphic_uri:
    description: URI to the figure graphic/image file
    slot_uri: foaf:depiction
    range: uriorcurie

  # Grant slots
  fundref_doi:
    description: FundRef DOI for the funding organization
    slot_uri: datacite:doi
    range: uriorcurie
    pattern: "^10\\.\\d{4,9}/[-._;()/:A-Z0-9]+$"

  funding_source:
    description: Name of the funding organization/source
    slot_uri: frapo:hasFundingAgency
    range: string

  award_id:
    description: Grant or award identifier
    slot_uri: datacite:identifier
    range: string

  grant_id:
    description: Grant identifier from funding agency
    slot_uri: frapo:hasGrantNumber
    range: string

  agency:
    description: Funding agency name
    slot_uri: frapo:hasFundingAgency
    range: string

  order_in:
    description: Order/position of grant in the list
    slot_uri: pyeuropepmc:orderIn
    range: integer
    minimum_value: 0

  recipient:
    description: "DEPRECATED: Use recipients instead. Grant recipient name."
    slot_uri: frapo:hasRecipient
    range: string

  # Affiliation slots

  affiliated_author:
    description: Author affiliated with this institution
    slot_uri: pyeuropepmc:hasAffiliation
    range: AuthorEntity

  affiliated_institution:
    description: Institution the author is affiliated with
    slot_uri: org:memberOf
    range: InstitutionEntity

  affiliation_order:
    description: Order of affiliation in author's list
    slot_uri: pyeuropepmc:affiliationOrder
    range: integer
    minimum_value: 0

  # Institution slots
  display_name:
    description: Display name of the institution
    slot_uri: skos:prefLabel
    range: string

  ror_id:
    description: ROR (Research Organization Registry) identifier
    slot_uri: pyeuropepmc:rorId
    range: string

  country:
    description: Country name
    slot_uri: geo:country
    range: string

  country_code:
    description: ISO country code
    slot_uri: geo:countryCode
    range: string

  city:
    description: City name
    slot_uri: geo:city
    range: string

  latitude:
    description: Geographic latitude
    slot_uri: geo:lat
    range: decimal
    minimum_value: -90.0
    maximum_value: 90.0

  longitude:
    description: Geographic longitude
    slot_uri: geo:long
    range: decimal
    minimum_value: -180.0
    maximum_value: 180.0

  institution_type:
    description: Type of institution
    slot_uri: org:classification
    range: InstitutionType

  grid_id:
    description: GRID identifier
    slot_uri: pyeuropepmc:gridId
    range: string

  isni:
    description: ISNI identifier
    slot_uri: pyeuropepmc:isni
    range: string

  wikidata_id:
    description: Wikidata identifier
    slot_uri: owl:sameAs
    range: uriorcurie

  fundref_id:
    description: FundRef identifier
    slot_uri: pyeuropepmc:fundrefId
    range: string

  website:
    description: Institution website URL
    slot_uri: foaf:homepage
    range: uriorcurie

  established:
    description: Year established
    slot_uri: dcterms:created
    range: integer
    minimum_value: 1000
    maximum_value: 9999

  domains:
    description: Institution domains
    slot_uri: dcterms:subject
    multivalued: true
    range: string

  # Journal slots
  medline_abbreviation:
    description: Medline abbreviation
    slot_uri: bibo:shortTitle
    range: string

  iso_abbreviation:
    description: ISO abbreviation
    slot_uri: bibo:shortTitle
    range: string

  nlmid:
    description: NLM ID (National Library of Medicine identifier)
    slot_uri: bibo:nlmid
    range: string

  essn:
    description: Electronic ISSN
    slot_uri: bibo:eissn
    range: string
    pattern: "^\\d{4}-\\d{3}[\\dX]$"

  language:
    description: Primary language of publication
    slot_uri: dcterms:language
    range: string

  journal_issue_id:
    description: Europe PMC journal issue identifier
    slot_uri: bibo:issue
    range: string

  scopus_source_id:
    description: Scopus source identifier
    slot_uri: pyeuropepmc:scopusSourceId
    range: string

  subject_areas:
    description: Subject areas/categories
    slot_uri: dcterms:subject
    multivalued: true
    range: string

  impact_factor:
    description: Journal impact factor
    slot_uri: pyeuropepmc:impactFactor
    range: decimal

  sjr:
    description: SCImago Journal Rank
    slot_uri: pyeuropepmc:sjr
    range: decimal

  h_index:
    description: Journal h-index
    slot_uri: pyeuropepmc:hIndex
    range: integer
    minimum_value: 0

  nlm_ta:
    description: NLM Title Abbreviation
    slot_uri: bibo:nlmTA
    range: string

  iso_abbrev:
    description: ISO abbreviation (alternative field)
    slot_uri: bibo:isoAbbrev
    range: string

  publisher_id:
    description: Publisher identifier
    slot_uri: pyeuropepmc:publisherId
    range: string

  # Reference slots
  author_list:
    description: Author list (comma-separated)
    slot_uri: bibo:authorList
    range: string

  raw_citation:
    description: Raw citation text when parsing fails
    slot_uri: dcterms:description
    range: string

  # Table slots
  table_label:
    description: Table label (e.g., "Table 1")
    slot_uri: rdfs:label
    range: string

  headers:
    description: Column headers for the table
    slot_uri: rdfs:label
    multivalued: true
    range: string

  cells:
    description: Cell values for a table row
    slot_uri: rdfs:member
    multivalued: true
    range: string

  # Section slots
  content:
    description: Section text content
    slot_uri: nif:isString
    range: string

  begin_index:
    description: NIF begin offset for text alignment
    slot_uri: nif:beginIndex
    range: integer
    minimum_value: 0

  end_index:
    description: NIF end offset for text alignment
    slot_uri: nif:endIndex
    range: integer
    minimum_value: 0

  section_type:
    description: Type/category of the section
    slot_uri: dcterms:type
    range: SectionType

  context_text:
    description: Surrounding text context of a citation
    slot_uri: pyeuropepmc:contextText
    range: string

  citation_type:
    description: Type of citation relationship
    slot_uri: cito:citationType
    range: CitationType

  # Relationship slots
  authors:
    description: Authors of a work
    slot_uri: dcterms:creator
    multivalued: true
    range: AuthorEntity

  papers:
    description: Papers authored by an author
    slot_uri: foaf:made
    multivalued: true
    range: PaperEntity

  paper_institutions:
    description: Institutions affiliated with a paper
    slot_uri: pyeuropepmc:affiliatedWith
    multivalued: true
    range: InstitutionEntity

  author_institutions:
    description: Institutions affiliated with an author
    slot_uri: pyeuropepmc:affiliatedWith
    multivalued: true
    range: InstitutionEntity

  affiliations:
    description: Author affiliations with institutions
    slot_uri: pyeuropepmc:hasAffiliation
    multivalued: true
    range: AffiliationEntity

  institution_members:
    description: Members of an institution
    slot_uri: org:hasMember
    multivalued: true
    range: AuthorEntity

  journal:
    description: Journal of a paper
    slot_uri: bibo:journal
    range: JournalEntity

  journal_papers:
    description: Papers published in a journal
    slot_uri: bibo:article
    multivalued: true
    range: PaperEntity

  sections:
    description: Sections of a paper
    slot_uri: dcterms:hasPart
    multivalued: true
    range: SectionEntity

  section_paper:
    description: Paper containing a section
    slot_uri: dcterms:isPartOf
    range: PaperEntity

  subsections:
    description: Subsections of a section
    slot_uri: dcterms:hasPart
    multivalued: true
    range: SectionEntity

  parent_section:
    description: Parent section of a subsection
    slot_uri: dcterms:isPartOf
    range: SectionEntity

  references:
    description: References cited by a paper
    slot_uri: cito:cites
    multivalued: true
    range: ReferenceEntity

  citing_paper:
    description: Paper that cites this reference
    slot_uri: cito:isCitedBy
    range: PaperEntity

  tables:
    description: Tables in a paper
    slot_uri: dcterms:hasPart
    multivalued: true
    range: TableEntity

  table_paper:
    description: Paper containing a table
    slot_uri: dcterms:isPartOf
    range: PaperEntity

  rows:
    description: Rows in a table
    slot_uri: dcterms:hasPart
    multivalued: true
    range: TableRowEntity

  row_table:
    description: Table containing a row
    slot_uri: dcterms:isPartOf
    range: TableEntity

  figures:
    description: Figures in a paper
    slot_uri: dcterms:hasPart
    multivalued: true
    range: FigureEntity

  figure_paper:
    description: Paper containing a figure
    slot_uri: dcterms:isPartOf
    range: FigureEntity

  grants:
    description: Grants funding a paper
    slot_uri: foaf:fundedBy
    multivalued: true
    range: GrantEntity

  recipients:
    description: Recipients of a grant
    slot_uri: frapo:hasRecipient
    multivalued: true
    range: AuthorEntity

  funded_papers:
    description: Papers funded by a grant
    slot_uri: frapo:funds
    multivalued: true
    range: PaperEntity

  citations:
    description: Citations within a section
    slot_uri: cito:cites
    multivalued: true
    range: CitationContextEntity

  citation_contexts:
    description: Citation contexts in a section
    slot_uri: pyeuropepmc:citationContext
    multivalued: true
    range: CitationContextEntity

  cited_paper:
    description: Paper being cited
    slot_uri: cito:isCitedBy
    range: PaperEntity

  citing_section:
    description: Section containing the citation
    slot_uri: cito:cites
    range: SectionEntity

  # Author slots
  full_name:
    description: Full name of the author
    slot_uri: foaf:name
    range: string

  first_name:
    description: First/given name of the author
    slot_uri: foaf:givenName
    range: string

  last_name:
    description: Last/family name of the author
    slot_uri: foaf:familyName
    range: string

  initials:
    description: Author's initials
    slot_uri: foaf:initials
    range: string

  orcid:
    description: ORCID identifier
    slot_uri: datacite:orcid
    range: string
    pattern: "^\\d{4}-\\d{4}-\\d{4}-\\d{3}[\\dX]$"

  email:
    description: Email address
    slot_uri: foaf:mbox
    range: string
    pattern: "^[\\w\\.-]+@[\\w\\.-]+\\.\\w+$"

  position:
    description: Author position/role
    slot_uri: org:role
    range: AuthorPosition

  roles:
    description: Specific roles or contributions of authors
    slot_uri: pyeuropepmc:authorRoles
    multivalued: true
    range: AuthorRole

  sources:
    description: Data sources for author information
    slot_uri: prov:hadPrimarySource
    multivalued: true
    range: string

  affiliation_text:
    description: Affiliation text
    slot_uri: pyeuropepmc:affiliationText
    range: string

  # Additional author slots
  name:
    description: Display name (for enrichment compatibility)
    slot_uri: foaf:name
    range: string

  semantic_scholar_author_id:
    description: Semantic Scholar author ID (alternative field)
    slot_uri: pyeuropepmc:semanticScholarAuthorId
    range: string

  scopus_author_id:
    description: Scopus author ID
    slot_uri: pyeuropepmc:scopusAuthorId
    range: string

  researcher_id:
    description: ResearcherID
    slot_uri: pyeuropepmc:researcherId
    range: string

  orcid_works_count:
    description: Number of works associated with ORCID
    slot_uri: pyeuropepmc:orcidWorksCount
    range: integer
    minimum_value: 0

  paper_count:
    description: Total number of papers by author
    slot_uri: pyeuropepmc:paperCount
    range: integer
    minimum_value: 0

  institutions:
    description: Institutional affiliations as InstitutionEntity objects
    slot_uri: org:memberOf
    multivalued: true
    range: InstitutionEntity

  # Additional institution slots
  relationships:
    description: Related institutions
    slot_uri: org:relationship
    multivalued: true
    range: string

  # Additional journal slots
  journal_ids:
    description: All journal identifiers by type
    slot_uri: pyeuropepmc:journalIds
    range: string

  # Additional section slots
  order:
    description: Document order of the section (1-based)
    slot_uri: pyeuropepmc:sectionOrder
    range: integer
    minimum_value: 1


# Class definitions
classes:
  BaseEntity:
    description: >-
      Base entity for all data models with RDF serialization support.
      All entities inherit from this base class, providing common functionality
      for validation, normalization, and RDF export.
    class_uri: pyeuropepmc:BaseEntity
    abstract: true
    slots:
      - id
      - label
      - source_uri
      - confidence
      - types
      - data_sources
      - last_updated

  ScholarlyWorkEntity:
    description: >-
      Base entity for scholarly works (papers, references, etc.).
      Provides common fields and methods for entities representing scholarly publications.
    class_uri: bibo:Document
    is_a: BaseEntity
    abstract: true
    slots:
      - title
      - doi
      - volume
      - pages
      - publication_year
      - publication_date
      - pmcid
      - pmid
      - semantic_scholar_id
      - authors
      - journal

  PaperEntity:
    description: >-
      Entity representing an academic paper with BIBO alignment.
      Contains bibliographic metadata, citation information, and relationships
      to authors, institutions, journals, and other entities.
    class_uri: bibo:AcademicArticle
    is_a: ScholarlyWorkEntity
    slots:
      - issue
      - pub_date
      - keywords
      - abstract
      - affiliation_text
      - citation_count
      - influential_citation_count
      - is_oa
      - oa_status
      - oa_url
      - reference_count
      - cited_by_count
      - publisher
      - issn
      - publication_type
      - first_page
      - last_page
      - semantic_scholar_corpus_id
      - openalex_id
      - license_url
      - license_text
      - fields_of_study
      - related_works
      - pub_types
      - mesh_terms
      - topics
      - has_pdf
      - has_supplementary
      - in_epmc
      - in_pmc
      - journal_issn
      - page_info
      - has_references
      - has_text_mined_terms
      - has_db_cross_references
      - has_labs_links
      - has_tm_accession_numbers
      - first_index_date
      - first_publication_date
      - external_ids
      - external_id_conflicts
      - license
      - authors
      - paper_institutions
      - affiliations
      - journal
      - sections
      - references
      - tables
      - figures
      - grants
      - quality_score
    slot_usage:
      title:
        required: false
      doi:
        required: false
      pmcid:
        required: false
      quality_score:
        range: float
        minimum_value: 0.0
        maximum_value: 1.0
        required: false
        description: Overall quality score for paper data completeness and accuracy
    rules:
      - preconditions:
          slot_conditions:
            pmcid:
              value_presence: ABSENT
            doi:
              value_presence: ABSENT
        postconditions:
          slot_conditions:
            title:
              value_presence: PRESENT
        description: >-
          PaperEntity must have at least one of: pmcid, doi, or title

  AuthorEntity:
    description: >-
      Entity representing an author with FOAF alignment.
      Contains personal information, institutional affiliations, and identifiers.
    class_uri: foaf:Person
    is_a: BaseEntity
    slots:
      - full_name
      - first_name
      - last_name
      - initials
      - affiliation_text
      - orcid
      - name
      - openalex_id
      - semantic_scholar_id
      - semantic_scholar_author_id
      - scopus_author_id
      - researcher_id
      - position
      - sources
      - email
      - papers
      - author_institutions
      - affiliations
      - institutions
      - h_index
      - citation_count
      - orcid_works_count
      - paper_count
      - roles
      - quality_score
    slot_usage:
      full_name:
        required: true
      roles:
        range: AuthorRole
        multivalued: true
        required: false
        description: Specific roles or contributions of the author
      quality_score:
        range: float
        minimum_value: 0.0
        maximum_value: 1.0
        required: false
        description: Confidence score for author data completeness and accuracy

  SectionEntity:
    description: >-
      Entity representing a document section with BIBO and NIF alignment.
      Contains section content and NIF text offsets for alignment.
    class_uri: bibo:DocumentPart
    is_a: BaseEntity
    slots:
      - title
      - content
      - begin_index
      - end_index
      - section_paper
      - subsections
      - parent_section
      - citations
      - section_type
      - order
      - citation_contexts
    slot_usage:
      content:
        required: true
      section_type:
        range: SectionType
        required: false
        description: Type/category of the section
      citation_contexts:
        range: CitationContextEntity
        multivalued: true
        required: false
        description: Detailed citation contexts within this section
    rules:
      - preconditions:
          slot_conditions:
            begin_index:
              value_presence: PRESENT
            end_index:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            begin_index:
              maximum_value: 999999999
            end_index:
              minimum_value: 0
        description: begin_index must be less than end_index

  CitationContextEntity:
    description: >-
      Entity representing the context of a citation within a section.
      Contains citation type, position, and surrounding text.
    class_uri: cito:Citation
    is_a: BaseEntity
    slots:
      - citation_type
      - begin_index
      - end_index
      - context_text
      - cited_paper
      - citing_section
      - confidence_score
    slot_usage:
      citation_type:
        range: CitationType
        required: true
      begin_index:
        required: true
        minimum_value: 0
      end_index:
        required: true
        minimum_value: 0
      context_text:
        required: false
        description: Surrounding text context of the citation
      confidence_score:
        range: float
        minimum_value: 0.0
        maximum_value: 1.0
        required: false
        description: Confidence score for citation type classification

  TableEntity:
    description: >-
      Entity representing a table with BIBO alignment.
      Contains table metadata and structured row data.
    class_uri: bibo:Table
    is_a: BaseEntity
    slots:
      - caption
      - table_label
      - headers
      - rows
      - table_paper

  TableRowEntity:
    description: Entity representing a table row.
    class_uri: bibo:Row
    is_a: BaseEntity
    slots:
      - cells
      - row_table
    slot_usage:
      cells:
        required: true
        minimum_cardinality: 1

  ReferenceEntity:
    description: >-
      Entity representing a bibliographic reference with BIBO alignment.
      Contains citation information for works referenced by papers.
    class_uri: bibo:Article
    is_a: ScholarlyWorkEntity
    slots:
      - author_list
      - raw_citation
      - citing_paper

  InstitutionEntity:
    description: >-
      Entity representing an institution with ROR alignment.
      Contains organizational metadata and geographic information.
    class_uri: org:Organization
    is_a: BaseEntity
    slots:
      - display_name
      - ror_id
      - openalex_id
      - country
      - country_code
      - city
      - latitude
      - longitude
      - institution_type
      - grid_id
      - isni
      - wikidata_id
      - fundref_id
      - website
      - established
      - domains
      - relationships
      - institution_members
    slot_usage:
      display_name:
        required: true

  JournalEntity:
    description: >-
      Entity representing an academic journal with BIBO alignment.
      Contains journal metadata and bibliometric information.
    class_uri: bibo:Journal
    is_a: BaseEntity
    slots:
      - title
      - medline_abbreviation
      - iso_abbreviation
      - nlmid
      - issn
      - essn
      - publisher
      - country
      - language
      - journal_issue_id
      - openalex_id
      - wikidata_id
      - scopus_source_id
      - subject_areas
      - impact_factor
      - sjr
      - h_index
      - nlm_ta
      - iso_abbrev
      - publisher_id
      - journal_ids
      - journal_papers
    slot_usage:
      title:
        required: true

  GrantEntity:
    description: >-
      Entity representing a research grant or funding award with FRAPO alignment.
      Contains funding information and relationships to recipients.
    class_uri: frapo:Grant
    is_a: BaseEntity
    slots:
      - fundref_doi
      - funding_source
      - award_id
      - grant_id
      - agency
      - order_in
      - recipient
      - recipients
      - funded_papers

  AffiliationEntity:
    description: >-
      Entity representing an author's affiliation with an institution.
      Contains the relationship between authors and institutions with affiliation text.
    class_uri: org:Membership
    is_a: BaseEntity
    slots:
      - affiliation_text
      - affiliated_author
      - affiliated_institution
      - affiliation_order

  FigureEntity:
    description: >-
      Entity representing a figure with BIBO alignment.
      Contains figure metadata and graphic URI.
    class_uri: bibo:Image
    is_a: BaseEntity
    slots:
      - caption
      - figure_label
      - graphic_uri
      - figure_paper
