name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "PyPI environment (testpypi or pypi)"
        required: true
        default: "pypi"
        type: choice
        options:
          - testpypi
          - pypi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Verify: run quick checks before publishing
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest

    - name: Check Poetry configuration
      run: poetry check --no-interaction

    - name: Validate version
      run: |
        VERSION=$(poetry version --short)
        echo "Package version: $VERSION"
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != "$TAG_VERSION" ]]; then
            echo "ERROR: Package version ($VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check: OK ($VERSION matches tag)"
        fi

    - name: Run lint checks
      run: |
        poetry install --with dev --no-interaction
        poetry run ruff check src/
        poetry run ruff format --check src/
        poetry run mypy src/ || true

    - name: Run tests
      run: |
        poetry run pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Build: create distribution packages
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [verify]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest

    - name: Build distribution
      run: poetry build --no-interaction

    - name: Verify distribution
      run: |
        ls -la dist/
        python -m pip install dist/*.whl
        python -c "from pyeuropepmc import __version__; print(f'pyeuropepmc {__version__} import OK')"

    - name: Store distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/
        if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Attest: generate Sigstore provenance attestations
  # ---------------------------------------------------------------------------
  attest:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: dist/

    - name: Generate provenance attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: dist/*
        subject-name: ${{ github.repository }}

  # ---------------------------------------------------------------------------
  # Publish: upload to PyPI using trusted publishing (OIDC)
  # ---------------------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    needs: [build, attest]
    permissions:
      id-token: write
      contents: read

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'pypi' }}
      url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi' && 'https://test.pypi.org/project/pyEuropePMC/' || 'https://pypi.org/project/pyEuropePMC/' }}

    steps:
    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: dist/

    - name: Display distribution files
      run: |
        ls -la dist/
        sha256sum dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
        attestations: true
        verify-metadata: true
        skip-existing: true
        repository-url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi' && 'https://test.pypi.org/legacy/' || '' }}

  # ---------------------------------------------------------------------------
  # GitHub Release
  # ---------------------------------------------------------------------------
  github-release:
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: CHANGELOG.md
        files: dist/*
        generate_release_notes: true
        make_latest: true
