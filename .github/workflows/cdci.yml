name: CDCI Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Ensure Git LFS objects are present
        run: |
          git lfs install --local || true
          git lfs pull || true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Run Ruff (linting and formatting check)
        run: |
          poetry run ruff check src/
          poetry run ruff format --check src/

      - name: Run Bandit (security checks)
        run: |
          poetry run bandit -r ./src --exclude "tests,.venv,.git,.mypy_cache,.pytest_cache" --skip "B101,B303"

      - name: Run mypy (type checking)
        run: |
          poetry run mypy src/

      - name: Install CodeScene CLI
        run: |
          echo "Installing CodeScene CLI..."
          curl -s https://downloads.codescene.io/enterprise/cli/install-cs-tool.sh | bash -s -- -y

      - name: Run CodeScene Code Health Analysis
        continue-on-error: true
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        run: |
          mkdir -p analysis_output
          if command -v cs &> /dev/null; then
            echo "Running CodeScene delta analysis..."
            cs delta --output-format json > analysis_output/codescene_delta.json 2>&1 || echo '{"error": "CodeScene delta analysis failed"}' > analysis_output/codescene_delta.json
            cs delta > analysis_output/codescene_delta.txt 2>&1 || echo "CodeScene delta analysis failed" > analysis_output/codescene_delta.txt
          else
            echo "CodeScene CLI not available, skipping delta analysis"
            echo '{"error": "CodeScene CLI not available"}' > analysis_output/codescene_delta.json
            echo "CodeScene CLI not available" > analysis_output/codescene_delta.txt
          fi

      - name: Run tests with coverage
        run: |
          mkdir -p coverage/reports
          poetry run pytest --cov --cov-report=xml:coverage/reports/coverage.xml --cov-report=term --cov-report=html --junitxml=coverage/reports/junit.xml

      - name: Enforce coverage threshold
        run: |
          poetry run coverage report --fail-under=75
          echo "✅ Coverage threshold met (75%+)"

      - name: Upload coverage to Coveralls
        continue-on-error: true
        if: always()
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.xml

      - name: Upload coverage reports to Codecov
        continue-on-error: true
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage/reports/
          env_vars: OS,PYTHON
          fail_ci_if_error: false
