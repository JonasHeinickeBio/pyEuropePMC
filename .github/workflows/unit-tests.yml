name: CI — Unit Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'

permissions:
  contents: read
  issues: write

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
<<<<<<< copilot/adopt-linkml-as-source-of-truth
